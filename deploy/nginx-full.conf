# 完整的 Nginx 配置 - 防止 /ontologyagent 跳转到根路径
# 使用方法：
# 1. 备份现有配置: sudo mv /etc/nginx/conf.d/ontologyagent.conf /etc/nginx/conf.d/ontologyagent.conf.bak
# 2. 复制此文件: sudo cp deploy/nginx-full.conf /etc/nginx/conf.d/ontologyagent.conf
# 3. 测试配置: sudo nginx -t
# 4. 重载 Nginx: sudo systemctl reload nginx

server {
    listen 80;
    server_name 59.110.21.174 _;

    # 关键：明确处理 /ontologyagent 路径，不做任何重定向

    # 1. /ontologyagent 精确匹配（无尾斜杠）- 返回 301 到带斜杠版本
    location = /ontologyagent {
        return 301 $scheme://$host/ontologyagent/;
    }

    # 2. /ontologyagent/ 及其子路径 - 代理到前端容器
    location /ontologyagent/ {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        # 防止自动跳转
        proxy_redirect off;
    }

    # 3. API 请求 - 代理到后端
    location /ontologyagent/api/ {
        proxy_pass http://127.0.0.1:8000/api/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Prefix /ontologyagent;

        # 防止自动跳转
        proxy_redirect off;
    }

    # 4. 健康检查 - 代理到后端
    location = /ontologyagent/health {
        proxy_pass http://127.0.0.1:8000/health;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;

        # 防止自动跳转
        proxy_redirect off;
    }

    # 5. 根路径 - 返回简单提示或 404
    location = / {
        default_type text/html;
        return 200 '<!DOCTYPE html><html><head><meta charset="utf-8"><title>Server</title></head><body><h1>Server is running</h1><p>Visit <a href="/ontologyagent/">/ontologyagent/</a> for Ontology Agent</p></body></html>';
    }

    # 6. 其他路径 - 返回 404
    location / {
        return 404;
    }
}

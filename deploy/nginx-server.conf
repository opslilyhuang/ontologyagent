# /etc/nginx/conf.d/ontologyagent.conf
# 这是服务器外层 Nginx 的配置，用于代理到 Docker 容器

server {
    listen 80;
    server_name 59.110.21.174;

    # 精确匹配 /ontologyagent（无尾斜杠）- 重定向到带斜杠版本
    location = /ontologyagent {
        return 301 $scheme://$host/ontologyagent/;
    }

    # 后端健康检查
    location /ontologyagent/health {
        proxy_pass http://localhost:8000/health;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # 后端 API - 转发到 Docker 后端容器
    location /ontologyagent/api/ {
        proxy_pass http://localhost:8000/api/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Prefix /ontologyagent;

        # WebSocket 支持（如果需要）
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        # 超时设置
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }

    # 前端静态资源 - 转发到 Docker frontend 容器
    location /ontologyagent/ {
        proxy_pass http://localhost:3000/ontologyagent/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # WebSocket 支持（如果需要）
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        # 缓存控制
        proxy_cache_bypass $http_upgrade;
    }
}

# 宿主机 Nginx 配置：将 /ontologyagent 转发到 Docker 前端/后端，且不重定向到根路径
# 用法：复制到 /etc/nginx/conf.d/ontologyagent.conf 后执行: sudo nginx -t && sudo systemctl reload nginx
# 若 80 端口已在主配置里，可只取 location 块并入主 server {}。

server {
    listen 80;
    server_name 59.110.21.174;   # 可改为你的域名或 _ 表示默认

    # 无尾斜杠：直接代理到 /ontologyagent/，避免被 location / 转到根
    location = /ontologyagent {
        proxy_pass http://127.0.0.1:3000/ontologyagent/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /ontologyagent/ {
        proxy_pass http://127.0.0.1:3000/ontologyagent/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /ontologyagent/api/ {
        proxy_pass http://127.0.0.1:8000/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Prefix /ontologyagent;
    }

    location /ontologyagent/health {
        proxy_pass http://127.0.0.1:8000/health;
        proxy_set_header Host $host;
    }
}

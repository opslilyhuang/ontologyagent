# 子路径部署：应用在 /ontologyagent，不影响 IP 根路径
server {
    listen 3000;
    root /usr/share/nginx/html;
    index index.html;

    # API 与健康检查：/ontologyagent/api、/ontologyagent/health 转发到后端
    location /ontologyagent/api/ {
        rewrite ^/ontologyagent(.*)$ $1 break;
        proxy_pass http://backend:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Prefix /ontologyagent;
    }

    location /ontologyagent/health {
        rewrite ^/ontologyagent(.*)$ $1 break;
        proxy_pass http://backend:8000;
        proxy_set_header Host $host;
    }

    # 精确匹配 /ontologyagent（无尾斜杠）：使用绝对URL重定向，避免被反向代理错误处理
    location = /ontologyagent {
        return 301 $scheme://$host/ontologyagent/;
    }

    # 前端静态：/ontologyagent/ 下为 SPA
    location /ontologyagent/ {
        alias /usr/share/nginx/html/ontologyagent/;
        try_files $uri $uri/ /ontologyagent/index.html;
    }

    # 根路径不托管本应用，避免影响同机其他服务
    location = / {
        return 404;
    }
}
